name: CI

on:
  pull_request:
    branches: [master, stable]

jobs:
  # ---------------------------------------------------------------------------
  # Lint — flake8 (errors + undefined names) and bandit (medium/high severity)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools
        run: pip install flake8 bandit

      - name: flake8
        run: |
          flake8 \
            --max-line-length=120 \
            --select=E,F \
            --exclude=.git,__pycache__,build_scripts \
            .

      - name: bandit
        run: |
          bandit -r . \
            --exclude ./.git \
            --severity-level medium \
            -q

  # ---------------------------------------------------------------------------
  # Tests
  # Install system libs your project needs before running (e.g. libegl1 for
  # PyQt6). Add QT_QPA_PLATFORM=offscreen if tests import Qt widgets.
  # ---------------------------------------------------------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # TODO: add system library installs if needed, e.g.:
      # - name: Install system libraries
      #   run: sudo apt-get update -qq && sudo apt-get install -y libegl1 libgl1

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        env:
          PYTHONPATH: .
          # QT_QPA_PLATFORM: offscreen  # uncomment if tests import Qt
        run: pytest tests/ -v

  # ---------------------------------------------------------------------------
  # Build — replace with your project's actual build steps.
  # Upload build artifacts with short retention so PRs are manually testable.
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest  # TODO: change runner if needed (e.g. windows-latest)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # TODO: add your build steps here
