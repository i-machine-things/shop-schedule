services:
  foreman-schedule:
    image: foreman-schedule:latest
    build: .
    container_name: foreman-schedule
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    volumes:
      # Generated schedule, uploaded display PDFs — persisted outside the container
      - ./public:/app/public
      # PDF drop folder (drop a PDF here to trigger a schedule update)
      - ./incoming:/app/incoming
      # Archive of processed PDFs
      - ./processed:/app/processed
    environment:
      # ── Gmail (required) ───────────────────────────────────────────────────
      # Set GMAIL_USER and GMAIL_PASS in a .env file alongside docker-compose.yml
      - GMAIL_USER=${GMAIL_USER:-}
      - GMAIL_PASS=${GMAIL_PASS:-}

      # ── Shop details ───────────────────────────────────────────────────────
      - SHOP_NAME=${SHOP_NAME:-My Shop}
      # Company name exactly as it appears in the PDF header (used to skip that line)
      - PDF_COMPANY_NAME=${PDF_COMPANY_NAME:-}
      # Filename for the saved Foreman Report PDF
      - PDF_FILENAME=${PDF_FILENAME:-last_report.pdf}

      # ── Dashboard port (default 8080) ──────────────────────────────────────
      - PORT=${PORT:-8080}

      # ── System timezone ────────────────────────────────────────────────────
      # Full tz name: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
      - TZ=${TZ:-America/New_York}
