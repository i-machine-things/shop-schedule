<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Department Colors — Shop Schedule</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #07070f;
      color: #ddd;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      padding: 40px 24px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 36px;
    }

    header a {
      color: #4af;
      text-decoration: none;
      font-size: 20px;
      opacity: 0.7;
    }

    header a:hover { opacity: 1; }

    h1 {
      font-size: 16px;
      color: #fff;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    #status {
      margin-bottom: 24px;
      font-size: 12px;
      color: #4af;
      letter-spacing: 1px;
      min-height: 18px;
    }

    #status.err { color: #f55; }

    #dept-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 640px;
    }

    .dept-row {
      display: grid;
      grid-template-columns: 1fr 120px 120px 48px;
      align-items: center;
      gap: 12px;
      background: #0b0b18;
      border: 1px solid #222;
      padding: 12px 16px;
    }

    .dept-name {
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #fff;
    }

    .color-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .color-group label {
      font-size: 10px;
      color: #555;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .color-group input[type="color"] {
      width: 100%;
      height: 28px;
      border: 1px solid #333;
      background: #111;
      cursor: pointer;
      padding: 2px;
    }

    .swatch {
      height: 48px;
      border-left: 4px solid var(--accent);
      background: var(--bg);
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 32px;
      max-width: 640px;
    }

    button {
      padding: 12px 28px;
      font-family: inherit;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid #4af;
      background: transparent;
      color: #4af;
      transition: background 0.2s;
    }

    button:hover { background: #1a2a44; }

    #btn-reset {
      border-color: #f55;
      color: #f55;
    }

    #btn-reset:hover { background: #2a0f0f; }

    .empty {
      color: #555;
      font-size: 13px;
      letter-spacing: 1px;
      padding: 20px 0;
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html" title="Home">&#8962;</a>
    <h1>Department Colors</h1>
  </header>

  <div id="status"></div>
  <div id="dept-list"></div>

  <div class="actions">
    <button id="btn-save">Save</button>
    <button id="btn-reset">Reset to Defaults</button>
  </div>

  <script>
  let colors = {};

  function setStatus(msg, isErr) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = isErr ? 'err' : '';
  }

  function renderRow(key, entry) {
    const row = document.createElement('div');
    row.className = 'dept-row';
    row.dataset.key = key;

    const name = document.createElement('div');
    name.className = 'dept-name';
    name.textContent = entry.name || key;

    const bgGroup = document.createElement('div');
    bgGroup.className = 'color-group';
    bgGroup.innerHTML = '<label>Background</label>';
    const bgInput = document.createElement('input');
    bgInput.type = 'color';
    bgInput.value = entry.bg;
    bgGroup.appendChild(bgInput);

    const accentGroup = document.createElement('div');
    accentGroup.className = 'color-group';
    accentGroup.innerHTML = '<label>Accent</label>';
    const accentInput = document.createElement('input');
    accentInput.type = 'color';
    accentInput.value = entry.accent;
    accentGroup.appendChild(accentInput);

    const swatch = document.createElement('div');
    swatch.className = 'swatch';
    swatch.style.setProperty('--bg', entry.bg);
    swatch.style.setProperty('--accent', entry.accent);

    function sync() {
      swatch.style.setProperty('--bg', bgInput.value);
      swatch.style.setProperty('--accent', accentInput.value);
      colors[key].bg = bgInput.value;
      colors[key].accent = accentInput.value;
    }
    bgInput.addEventListener('input', sync);
    accentInput.addEventListener('input', sync);

    row.append(name, bgGroup, accentGroup, swatch);
    return row;
  }

  function render() {
    const list = document.getElementById('dept-list');
    list.innerHTML = '';
    const keys = Object.keys(colors).sort();
    if (!keys.length) {
      list.innerHTML = '<div class="empty">No departments yet — run a report first.</div>';
      return;
    }
    keys.forEach(k => list.appendChild(renderRow(k, colors[k])));
  }

  async function load() {
    try {
      const r = await fetch('/api/dept-colors');
      colors = await r.json();
      render();
    } catch (e) {
      setStatus('Failed to load department colors.', true);
    }
  }

  document.getElementById('btn-save').addEventListener('click', async () => {
    try {
      const r = await fetch('/api/dept-colors', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(colors),
      });
      const j = await r.json();
      setStatus(j.ok ? 'Saved.' : 'Save failed.', !j.ok);
    } catch (e) {
      setStatus('Save failed.', true);
    }
  });

  document.getElementById('btn-reset').addEventListener('click', async () => {
    if (!confirm('Reset all department colors to defaults? This cannot be undone.')) return;
    try {
      await fetch('/api/dept-colors', { method: 'DELETE' });
      colors = {};
      render();
      setStatus('Reset. Colors will regenerate on the next report run.');
    } catch (e) {
      setStatus('Reset failed.', true);
    }
  });

  load();
  </script>
</body>
</html>
