<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kiosk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--fade-ms, 1500ms) ease;
      will-change: opacity;
    }
    .slide.active { opacity: 1; pointer-events: auto; }
    .slide iframe { width: 100%; height: 100%; border: none; display: block; }
  </style>
</head>
<body>
  <div id="sched-slide" class="slide active"><iframe id="sched-frame" src="schedule.html"></iframe></div>
  <div id="ca-slide"    class="slide"><iframe id="frame-a"></iframe></div>
  <div id="cb-slide"    class="slide"><iframe id="frame-b"></iframe></div>

  <script>
  const SCHEDULE_URL  = 'schedule.html';
  let SCHEDULE_MAX_MS = 5 * 60 * 1000; // overridden by schedule_max_s from pages.json
  let ALLOW_MANUAL_SCROLL = false;      // set by allow_manual_scroll in pages.json

  const schedSlide = document.getElementById('sched-slide');
  const schedFrame = document.getElementById('sched-frame');
  const slots = [
    { slide: document.getElementById('ca-slide'), frame: document.getElementById('frame-a') },
    { slide: document.getElementById('cb-slide'), frame: document.getElementById('frame-b') },
  ];

  let currentSlide  = schedSlide;
  let currentIndex  = 0;
  let cycleCount    = 0;
  let advTimer      = null;
  let transitioning = false;
  let slotPing      = 0;
  let configLoaded  = false;

  let SCHEDULE_CYCLES = 2;
  let PAGE_DURATION   = 60;
  let FADE_MS         = 1500;
  let PAGES           = [{ url: SCHEDULE_URL }];

  function nextSlot() {
    const s = slots[slotPing];
    slotPing ^= 1;
    return s;
  }

  function postToSched(type) {
    try { schedFrame.contentWindow.postMessage({ type }, '*'); } catch (_) {}
  }

  function allSlides() { return [schedSlide, slots[0].slide, slots[1].slide]; }

  function crossfadeTo(slide, onDone) {
    if (transitioning) return;
    transitioning = true;
    allSlides().forEach(s => s.classList.toggle('active', s === slide));
    currentSlide = slide;
    setTimeout(() => { transitioning = false; if (onDone) onDone(); }, FADE_MS);
  }

  // advTimer is null when no countdown is running; set to null on fire so
  // fits-screen can tell whether to start a new one.
  function _armAdv(ms) {
    clearTimeout(advTimer);
    advTimer = setTimeout(() => { advTimer = null; advance(); }, ms);
  }

  function advance() {
    goToPage((currentIndex + 1) % PAGES.length);
  }

  function goToPage(index) {
    clearTimeout(advTimer);
    advTimer    = null;
    cycleCount  = 0;
    currentIndex = index;
    const page  = PAGES[index];

    if (page.url === SCHEDULE_URL) {
      crossfadeTo(schedSlide, () => {
        postToSched('resume');
        // When allow_manual_scroll is on the user drives the page; don't auto-advance.
        if (PAGES.length > 1 && !ALLOW_MANUAL_SCROLL) _armAdv(SCHEDULE_MAX_MS);
      });
    } else {
      postToSched('pause');
      const slot = nextSlot();
      slot.frame.onload = null;

      const show = () => {
        slot.frame.onload = null;
        clearTimeout(loadFallback);
        crossfadeTo(slot.slide, () => {
          _armAdv((page.seconds ?? PAGE_DURATION) * 1000);
        });
      };

      slot.frame.onload = show;
      slot.frame.src    = page.url;
      const loadFallback = setTimeout(show, 3000);
    }
  }

  window.addEventListener('message', e => {
    if (e.source !== schedFrame.contentWindow) return;
    if (e.data?.type === 'scroll-cycle') {
      if (currentSlide !== schedSlide) return;
      if (++cycleCount >= SCHEDULE_CYCLES && PAGES.length > 1) advance();
    } else if (e.data?.type === 'fits-screen') {
      // Content fits without scrolling — arm the fallback timer only if one
      // isn't already running. Schedule updates fire fits-screen too, and we
      // must not let them reset a countdown that's already in progress.
      // When allow_manual_scroll is on, skip auto-advance entirely.
      if (currentSlide !== schedSlide || PAGES.length <= 1 || ALLOW_MANUAL_SCROLL) return;
      if (advTimer === null) _armAdv(SCHEDULE_MAX_MS);
    }
  });

  function applyConfig(cfg) {
    SCHEDULE_CYCLES     = cfg.scroll_cycles      ?? 2;
    PAGE_DURATION       = cfg.page_duration      ?? 60;
    FADE_MS             = cfg.transition_ms      ?? 1500;
    const _rawMaxS      = parseInt(cfg.schedule_max_s, 10);
    SCHEDULE_MAX_MS     = (Number.isNaN(_rawMaxS) ? 300 : Math.max(1, Math.min(_rawMaxS, 3600))) * 1000;
    ALLOW_MANUAL_SCROLL = cfg.allow_manual_scroll === true;
    if (ALLOW_MANUAL_SCROLL) { clearTimeout(advTimer); advTimer = null; }
    document.documentElement.style.setProperty('--fade-ms', FADE_MS + 'ms');
    const extra = (cfg.pages ?? []).map(p => typeof p === 'string' ? { url: p } : p);
    PAGES = [{ url: SCHEDULE_URL }, ...extra];
    // On first load, arm the safety valve if extra pages are configured
    if (!configLoaded && PAGES.length > 1 && currentSlide === schedSlide && !ALLOW_MANUAL_SCROLL) {
      _armAdv(SCHEDULE_MAX_MS);
    }
    configLoaded = true;
  }

  // Use /api/pages so we always get valid JSON even when pages.json doesn't exist yet.
  // Reload every 60 s so options-page changes take effect without a kiosk restart.
  fetch('/api/pages').then(r => r.json()).then(applyConfig).catch(() => { configLoaded = true; });
  setInterval(() => {
    fetch('/api/pages').then(r => r.json()).then(applyConfig).catch(() => {});
  }, 60 * 1000);

  // Block browser back/forward navigation so the kiosk page can't be left.
  history.pushState(null, '', location.href);
  window.addEventListener('popstate', () => history.pushState(null, '', location.href));
  </script>
</body>
</html>
