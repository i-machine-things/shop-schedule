<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shop Schedule</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #07070f;
      color: #ddd;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
    }

    #clock {
      font-size: 48px;
      color: #4af;
      font-weight: bold;
      letter-spacing: 6px;
    }

    .brand h1 {
      font-size: 24px;
      color: #fff;
      letter-spacing: 5px;
      text-transform: uppercase;
      text-align: center;
    }

    .brand p {
      font-size: 11px;
      color: #888;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-align: center;
      margin-top: 8px;
    }

    nav {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    nav a {
      display: block;
      padding: 14px 36px;
      background: #111128;
      color: #4af;
      text-decoration: none;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-size: 12px;
      border: 1px solid #4af;
      transition: background 0.2s, color 0.2s;
    }

    nav a:hover {
      background: #1a2a44;
      color: #8cf;
    }

    #theme-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      background: transparent;
      border: 1px solid #4af;
      color: #4af;
      cursor: pointer;
      font-size: 14px;
      width: 32px;
      height: 32px;
      font-family: inherit;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    #theme-btn:hover { opacity: 1; background: #1a2a44; }

    [data-theme="light"] body { background: #f5f5f0; color: #111; }
    [data-theme="light"] #clock { color: #0066cc; }
    [data-theme="light"] .brand h1 { color: #111; }
    [data-theme="light"] .brand p { color: #555; }
    [data-theme="light"] nav a { background: #e8e8f0; color: #0066cc; border-color: #0066cc; }
    [data-theme="light"] nav a:hover { background: #c0d8f0; color: #004499; }
    [data-theme="light"] #theme-btn { border-color: #0066cc; color: #0066cc; }
    [data-theme="light"] #theme-btn:hover { background: #c0d8f0; }
  </style>
  <script>if(localStorage.getItem('theme')==='light')document.documentElement.setAttribute('data-theme','light');</script>
</head>
<body>
  <div id="clock" aria-live="polite" aria-label="Current time" aria-atomic="true"></div>

  <div class="brand">
    <h1>Shop Schedule</h1>
    <p>Schurman Machine</p>
  </div>

  <nav>
    <a href="schedule.html">Schedule</a>
    <a href="kiosk.html">Kiosk</a>
    <a href="options.html">Options</a>
    <a href="install.html">Install</a>
  </nav>

  <button id="theme-btn" aria-label="Toggle theme">☀</button>

  <script>
    (function() {
      const t = localStorage.getItem('theme');
      const btn = document.getElementById('theme-btn');
      btn.textContent = t === 'light' ? '☾' : '☀';
      btn.addEventListener('click', function() {
        const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        if (next === 'light') document.documentElement.setAttribute('data-theme', 'light');
        else document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('theme', next);
        btn.textContent = next === 'light' ? '☾' : '☀';
      });
    })();

    (function tick() {
      document.getElementById('clock').textContent =
        new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      setTimeout(tick, 1000);
    })();
  </script>
</body>
</html>
