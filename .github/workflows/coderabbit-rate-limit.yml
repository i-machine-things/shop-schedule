name: CodeRabbit Rate Limit Handler

on:
  issue_comment:
    types: [created]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  handle-rate-limit:
    if: |
      github.event.comment.user.login == 'coderabbitai[bot]' &&
      contains(github.event.comment.body, 'Rate limit exceeded') &&
      github.event.issue.pull_request != null
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Parse wait, delete rate-limit comment and subsequent CR comments
        id: setup
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const comment = context.payload.comment;
            const prNumber = context.payload.issue.number;
            const { owner, repo } = context.repo;

            // Parse wait time — handles "Xh and Ym and Zs", "Xm and Ys", "Xm"
            const body = comment.body;
            let waitSecs = 120;
            const full = body.match(
              /wait\s+\*\*(?:(\d+)\s+hours?\s+and\s+)?(?:(\d+)\s+minutes?\s+and\s+)?(\d+)\s+seconds?\*\*/
            );
            if (full) {
              waitSecs = (parseInt(full[1] || 0) * 3600)
                       + (parseInt(full[2] || 0) * 60)
                       + parseInt(full[3]);
            } else {
              const minsHrs = body.match(
                /wait\s+\*\*(?:(\d+)\s+hours?\s+and\s+)?(\d+)\s+minutes?\*\*/
              );
              if (minsHrs) {
                waitSecs = (parseInt(minsHrs[1] || 0) * 3600)
                         + (parseInt(minsHrs[2]) * 60);
              }
            }
            const waitWithBuffer = waitSecs + 60;
            console.log(`Rate limit wait: ${waitSecs}s → sleeping ${waitWithBuffer}s`);

            const limitTime = new Date(comment.created_at);
            const isCR = c => c.user.login === 'coderabbitai[bot]';

            const [issueComments, reviewComments] = await Promise.all([
              github.paginate(github.rest.issues.listComments,
                { owner, repo, issue_number: prNumber }),
              github.paginate(github.rest.pulls.listReviewComments,
                { owner, repo, pull_number: prNumber }),
            ]);

            // Any valid CR activity before the rate-limit comment?
            const hasValidBefore =
              issueComments.some(c => isCR(c) && new Date(c.created_at) < limitTime) ||
              reviewComments.some(c => isCR(c) && new Date(c.created_at) < limitTime);

            // Delete the rate-limit comment itself and all CR comments after it
            for (const c of issueComments.filter(c => isCR(c) && new Date(c.created_at) >= limitTime)) {
              await github.rest.issues.deleteComment({ owner, repo, comment_id: c.id });
              console.log(`Deleted issue comment ${c.id}`);
            }
            for (const c of reviewComments.filter(c => isCR(c) && new Date(c.created_at) >= limitTime)) {
              await github.rest.pulls.deleteReviewComment({ owner, repo, comment_id: c.id });
              console.log(`Deleted review comment ${c.id}`);
            }

            core.setOutput('wait_secs', waitWithBuffer);
            core.setOutput('pr_number', prNumber);
            core.setOutput('command', hasValidBefore ? '@coderabbitai resume' : '@coderabbitai review');

      - name: Wait for rate limit to expire
        run: sleep ${{ steps.setup.outputs.wait_secs }}

      - name: Trigger CodeRabbit
        uses: actions/github-script@v7
        env:
          CR_COMMAND: ${{ steps.setup.outputs.command }}
          PR_NUMBER: ${{ steps.setup.outputs.pr_number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const cmd = process.env.CR_COMMAND;
            const pr  = parseInt(process.env.PR_NUMBER);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: pr,
              body: cmd,
            });
            console.log(`Posted "${cmd}" on PR #${pr}`);
