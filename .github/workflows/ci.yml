name: CI

on:
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ---------------------------------------------------------------------------
  # Lint — flake8 (errors + undefined names) and bandit (medium/high severity)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools
        run: pip install flake8==7.3.0 bandit==1.9.4

      - name: flake8
        run: flake8 .

      - name: bandit
        run: |
          bandit -r . \
            --exclude ./.git,./__pycache__,./incoming \
            --severity-level medium \
            -q
