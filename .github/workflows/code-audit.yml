name: Automated Code Audit

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ---------------------------------------------------------------------------
  # Audit — files GitHub issues for new flake8 / bandit findings
  # ---------------------------------------------------------------------------
  audit:
    name: Code Audit (file issues)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install audit tools
        run: pip install flake8 bandit

      - name: Run flake8 (errors and undefined names only)
        run: |
          flake8 \
            --max-line-length=120 \
            --select=E,F \
            --exclude=.git,__pycache__,incoming \
            . > flake8_results.txt 2>&1 || true

      - name: Run bandit (medium/high severity only)
        run: |
          bandit -r . \
            --exclude ./.git,./__pycache__,./incoming \
            --severity-level medium \
            -f json -o bandit_results.json -q || true

      - name: Post findings as GitHub issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python tools/post_audit_issues.py

